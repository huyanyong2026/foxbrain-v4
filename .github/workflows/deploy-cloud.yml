name: Deploy FoxBrain Cloud Edition

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare compose env
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose config

      - name: Deploy to Tencent Cloud
        if: ${{ secrets.CLOUD_HOST != '' && secrets.CLOUD_USER != '' && secrets.CLOUD_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USER }}
          key: ${{ secrets.CLOUD_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.CLOUD_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="/opt/foxbrain-v4"; fi
            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            sudo git fetch origin main
            sudo git checkout main
            sudo git pull --ff-only origin main
            if [ ! -f .env ]; then sudo cp .env.example .env; fi
            sudo mkdir -p logs
            sudo docker compose up -d --build
            sudo docker compose ps
